<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Randomiser</title>
<style>
  @import url('data:text/css,');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    background: #1a1a1a;
    overflow: hidden;
    position: relative;
  }


  .bg-image {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('Youth-favicon-logo1.webp') center center / cover no-repeat;
    animation: bgFade 6s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes bgFade {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 0.2; }
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 1100px;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 5rem);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow:
      0 0 20px #E63946,
      0 0 40px #E63946,
      4px 4px 0 #8b0000;
    margin-bottom: 10px;
    animation: headingPulse 3s ease-in-out infinite;
  }
  @keyframes headingPulse {
    0%, 100% { text-shadow: 0 0 20px #E63946, 0 0 40px #E63946, 4px 4px 0 #8b0000; }
    50%       { text-shadow: 0 0 40px #ff6b75, 0 0 80px #ff6b75, 4px 4px 0 #cc0000; }
  }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    color: #ffffff;
    letter-spacing: 2px;
    margin-bottom: 50px;
    text-shadow: 2px 2px 0 rgba(230,57,70,0.5);
  }

  /* Result cards */
  .results {
    display: flex;
    gap: 30px;
    justify-content: center;
    align-items: stretch;
    flex-wrap: wrap;
    margin-bottom: 50px;
    min-height: 220px;
  }

  .card {
    flex: 1;
    min-width: 280px;
    max-width: 480px;
    border-radius: 24px;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-item {
    background: #E63946;
    border: 3px solid #E63946;
    box-shadow: 0 0 30px rgba(230,57,70,0.5), 0 8px 30px rgba(0,0,0,0.5);
  }

  .card-place {
    background: #111111;
    border: 3px solid #E63946;
    box-shadow: 0 0 30px rgba(230,57,70,0.3), 0 8px 30px rgba(0,0,0,0.5);
  }

  .card-label {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 14px;
    opacity: 0.85;
    color: #ffffff;
  }

  .card-text {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
    color: #ffffff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Spinning/shuffling state */
  .card-text.spinning {
    animation: shuffle 0.1s steps(1) infinite;
  }
  @keyframes shuffle {
    0%   { opacity: 1; transform: scale(1.05) rotate(-1deg); }
    25%  { opacity: 0.7; transform: scale(0.97) rotate(1deg); }
    50%  { opacity: 1; transform: scale(1.04) rotate(-0.5deg); }
    75%  { opacity: 0.8; transform: scale(0.98) rotate(0.5deg); }
    100% { opacity: 1; transform: scale(1.05) rotate(-1deg); }
  }

  /* Landing animation */
  .card-text.landing {
    animation: land 0.5s cubic-bezier(0.22, 1.4, 0.36, 1) forwards;
  }
  @keyframes land {
    0%   { transform: scale(1.3) rotate(-3deg); opacity: 0.5; }
    60%  { transform: scale(1.08) rotate(1deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .card.landed {
    animation: cardPop 0.5s cubic-bezier(0.22, 1.4, 0.36, 1) forwards;
  }
  @keyframes cardPop {
    0%   { transform: scale(0.95); }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* The "IN A..." connector */
  .connector {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: #ffffff;
    text-shadow: 3px 3px 0 #8b0000, 0 0 20px rgba(230,57,70,0.5);
    align-self: center;
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  /* Button */
  .spin-btn {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 22px 60px;
    border: 3px solid #E63946;
    border-radius: 60px;
    cursor: pointer;
    background: #1a1a1a;
    color: #ffffff;
    text-shadow: none;
    box-shadow:
      0 6px 0 #8b0000,
      0 8px 25px rgba(230,57,70,0.4);
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.1);
    transform: skewX(-20deg);
    animation: sheen 3s ease-in-out infinite;
  }
  @keyframes sheen {
    0%, 100% { left: -60%; }
    50%       { left: 120%; }
  }
  .spin-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    background: #E63946;
    box-shadow: 0 10px 0 #8b0000, 0 14px 35px rgba(230,57,70,0.6);
  }
  .spin-btn:active:not(:disabled) {
    transform: translateY(3px);
    background: #E63946;
    box-shadow: 0 2px 0 #8b0000, 0 4px 15px rgba(230,57,70,0.4);
  }
  .spin-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  /* Confetti burst */
  .confetti-piece {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 100;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(80vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* Idle placeholder text */
  .placeholder {
    color: rgba(255,255,255,0.35);
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="bg-image"></div>

<div class="container">
  <img src="welcomechurchlogo1.webp" alt="Welcome Church" style="height:80px; width:auto; margin-bottom:20px; display:block; margin-left:auto; margin-right:auto;">
  <h1>Human Play-dough</h1>
  <p class="subtitle">What will your scene be?</p>

  <div class="results">
    <div class="card card-item" id="card-item">
      <div class="card-label">Your Item</div>
      <div class="card-text" id="item-text">
        <span class="placeholder">???</span>
      </div>
    </div>

    <div class="connector">IN A</div>

    <div class="card card-place" id="card-place">
      <div class="card-label">Your Place</div>
      <div class="card-text" id="place-text">
        <span class="placeholder">???</span>
      </div>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">
    🎲 Randomise!
  </button>
</div>

<script>
  const ITEMS = [
    "Washing Machine","Rollercoaster","Lawnmower","Trampoline","Helicopter",
    "Shopping Trolley","Revolving Door","Catapult","Combine Harvester",
    "Hot Air Balloon","Cement Mixer","Forklift","Windmill","Escalator",
    "Rowing Boat","Motorbike","Vending Machine","Dentist Chair",
    "Photocopier","Ski Lift"
  ];

  const PLACES = [
    "Swimming Pool","The Oscars Ceremony","A Forest","Falling Out of the Sky",
    "The Moon","A Wedding Reception","Rush Hour Tube Train","A Volcano",
    "The World Cup Final","A Supermarket at Christmas","A Royal Banquet",
    "Quicksand","A Safari","The Olympic Opening Ceremony",
    "A Collapsing Building","The Bottom of the Ocean","A Busy Kitchen",
    "A Haunted House","New Year's Eve in London","A Medieval Battle"
  ];

  const COLORS = [
    "#E63946","#ff6b75","#ffffff","#cc0000","#ff4444",
    "#ff8888","#8b0000","#ffcccc","#dd0000","#ff2233"
  ];

  // --- Spin logic ---
  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function setCardText(el, text, state) {
    el.className = 'card-text';
    if (state) {
      void el.offsetWidth; // reflow to restart animation
      el.className = 'card-text ' + state;
    }
    el.textContent = text;
  }

  function spawnConfetti() {
    const btn = document.getElementById('spinBtn');
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const angle = (Math.random() * 360) * Math.PI / 180;
      const speed = 80 + Math.random() * 160;
      const dx = Math.cos(angle) * speed;
      const startX = cx + dx;
      piece.style.cssText = `
        left:${startX}px;
        top:${cy}px;
        background:${color};
        width:${8+Math.random()*10}px;
        height:${8+Math.random()*10}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${0.8+Math.random()*1}s;
        animation-delay:${Math.random()*0.2}s;
      `;
      document.body.appendChild(piece);
      piece.addEventListener('animationend', () => piece.remove());
    }
  }

  function spin() {
    const btn = document.getElementById('spinBtn');
    const itemEl = document.getElementById('item-text');
    const placeEl = document.getElementById('place-text');
    const cardItem = document.getElementById('card-item');
    const cardPlace = document.getElementById('card-place');

    btn.disabled = true;
    btn.textContent = '⚡ Spinning...';

    const finalItem = pick(ITEMS);
    const finalPlace = pick(PLACES);

    // Shuffle phase: rapidly flash random options
    let shuffleCount = 0;
    const totalShuffles = 28;
    const shuffleInterval = setInterval(() => {
      setCardText(itemEl, pick(ITEMS), 'spinning');
      setCardText(placeEl, pick(PLACES), 'spinning');
      shuffleCount++;

      // Slow down near the end
      if (shuffleCount >= totalShuffles * 0.65) {
        clearInterval(shuffleInterval);
        slowDown(itemEl, placeEl, cardItem, cardPlace, finalItem, finalPlace, btn);
      }
    }, 80);
  }

  function slowDown(itemEl, placeEl, cardItem, cardPlace, finalItem, finalPlace, btn) {
    const delays = [120, 160, 220, 300, 420, 580];
    let i = 0;

    function step() {
      if (i < delays.length) {
        setCardText(itemEl, i % 2 === 0 ? pick(ITEMS) : finalItem, 'spinning');
        setCardText(placeEl, i % 2 === 0 ? pick(PLACES) : finalPlace, 'spinning');
        i++;
        setTimeout(step, delays[i - 1]);
      } else {
        // Land!
        setCardText(itemEl, finalItem, 'landing');
        setCardText(placeEl, finalPlace, 'landing');

        cardItem.className = 'card card-item landed';
        cardPlace.className = 'card card-place landed';
        setTimeout(() => {
          cardItem.className = 'card card-item';
          cardPlace.className = 'card card-place';
        }, 600);

        spawnConfetti();

        btn.disabled = false;
        btn.textContent = '🎲 Randomise!';
      }
    }
    step();
  }
</script>
</body>
</html>
